<!DOCTYPE html>
<html>
<head>
    <title>The Colorado Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #header {
            height: 20%;
            overflow: hidden;
            background: #fff;
        }
        
        #header iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #content-wrapper {
            display: flex;
            height: 80%;
        }
        
        #sidebar {
            width: 30%;
            overflow-y: auto;
            background: #f5f5f5;
            border-right: 1px solid #ccc;
        }
        
        #main-frame {
            width: 70%;
            border: none;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Header with Logo -->
    <div id="header">
        <iframe src="logo.html" name="header"></iframe>
    </div>
    
    <!-- Content Area -->
    <div id="content-wrapper">
        <!-- Left Sidebar Navigation -->
        <div id="sidebar">
            <iframe src="Link.html" name="navigation" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
        
        <!-- Main Content Frame -->
        <iframe id="main-frame" src="TCE.html" name="Homepage"></iframe>
    </div>
</body>
</html>
